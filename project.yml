name: PocketDev
options:
  bundleIdPrefix: com.pockedev
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  SWIFT_VERSION: "5.9"
  DEVELOPMENT_TEAM: ""

packages:
  Gitty:
    url: git@github.com:RonenMars/Gitty.git
    branch: main

targets:
  PocketDev:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: PocketDev
    dependencies:
      - package: Gitty
        product: Gitty
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.pockedev.app
      INFOPLIST_FILE: PocketDev/Info.plist
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
