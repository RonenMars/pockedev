name: PockeDev
options:
  bundleIdPrefix: com.pockedev
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  SWIFT_VERSION: "5.9"
  DEVELOPMENT_TEAM: "GUW6BN8X57"

packages:
  Gitty:
    url: git@github.com:RonenMars/Gitty.git
    branch: main

targets:
  PockeDev:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: PockeDev
    dependencies:
      - package: Gitty
        product: Gitty
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.pockedev.app
      INFOPLIST_FILE: PockeDev/Info.plist
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "2"
  PockeDevTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: PockeDevTests
    dependencies:
      - target: PockeDev
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.pockedev.app.tests
      GENERATE_INFOPLIST_FILE: "YES"
